services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: asistencia-portfolio-dev
    ports:
      - "4200:4200"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm start -- --host 0.0.0.0
    environment:
      - NODE_ENV=development

  app-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: asistencia-portfolio-prod
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
